            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-2">ระบบคำนวณผลการเรียน</h1>

            { code: 'CEE3305', name: 'ภาษาต่างประเทศสำหรับครูประถมศึกษา', credit: 3, category: 'วิชาเอกบังคับ' },
            { code: 'CEE3401', name: 'การจัดการเรียนรู้แบบบูรณาการ', credit: 3, category: 'วิชาเอกบังคับ' },
            { code: 'CEE3501', name: 'นวัตกรรมและเทคโนโลยีการจัดการเรียนรู้สำหรับครูประถมศึกษา', credit: 3, category: 'วิชาเอกบังคับ' },
            { code: 'CEE3502', name: 'การสอนทักษะชีวิตสำหรับเด็ก', credit: 3, category: 'วิชาเอกบังคับ' },
            { code: 'MER3906', name: 'การวิจัยในชั้นเรียน', credit: 3, category: 'วิชาเอกบังคับ' },
            { code: 'CCE3110', name: 'เทคโนโลยีดิจิทัลสำหรับครู', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CCH2107', name: 'ภาษาจีนและการสอนภาษาจีนระดับประถมศึกษา', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE2303', name: 'การสอนเพื่อพัฒนาศักยภาพเด็ก', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE2310', name: 'กิจกรรมการสอนภาษาไทยระดับประถมศึกษา', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE3306', name: 'การจัดกิจกรรมการเรียนรู้นอกห้องเรียนสำหรับเด็ก', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE3402', name: 'การจัดกิจกรรมเสริมหลักสูตร', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE3403', name: 'กิจกรรมการสอนคณิตศาสตร์สำหรับครูประถมศึกษา', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE3404', name: 'การจัดกิจกรรมเตรียมความพร้อมสำหรับเด็ก', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CEE3503', name: 'วรรณกรรมสำหรับเด็ก', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CMA3215', name: 'เทคโนโลยีและการสืบค้นสำหรับครูคณิตศาสตร์', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CTH2101', name: 'วาทการสำหรับครู', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'CTL3002', name: 'การสอนเด็กพิเศษ', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'MER3006', name: 'การวัดและประเมินผลในระดับประถมศึกษา', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'PSY3214', name: 'จิตวิทยาเด็กและวัยรุ่น', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' },
            { code: 'RAM3099', name: 'เศรษฐกิจพอเพียงกับการพัฒนาชีวิต', credit: 3, category: 'วิชาเอกเลือก (เลือก 21 หน่วยกิต)' }
        ];

        let currentUser = {};
        let appLang = localStorage.getItem('appLang') || 'th';

        // --- 3. Login & Navigation ---
        async function login(type) {
            const u = type === 'admin' ? document.getElementById('adminUsername').value : document.getElementById('username').value;
            const p = type === 'admin' ? document.getElementById('adminPassword').value : document.getElementById('password').value;
            if(!u || !p) return Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
            Swal.fire({ title: 'กำลังตรวจสอบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const doc = await db.collection("Users").doc(u).get();
                Swal.close();
                if (doc.exists && doc.data().password === p) {
                    const data = doc.data();
                    if (type === 'admin' && data.role !== 'admin') return Swal.fire('ผิดพลาด', 'บัญชีนี้ไม่ใช่แอดมิน', 'error');
                    document.getElementById('loginSection').style.display = 'none';
                    if (data.role === 'admin') {
                        document.getElementById('adminSection').style.display = 'block';
                        loadAdmin();
                    } else {
                        currentUser = { ...data, id: u };
                        document.getElementById('studentSection').style.display = 'block';
                        document.getElementById('headerName').innerText = currentUser.name;
                        document.getElementById('profileId').innerText = `รหัส: ${currentUser.studentId}`;
                        updateDashboard();
                    }
                } else { Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง', 'error'); }
            } catch (err) { Swal.fire('ข้อผิดพลาด', 'เชื่อมต่อล้มเหลว', 'error'); }
        }

        // --- 4. Core Logic: Grades & Constraints ---
        async function updateDashboard() {
            const snap = await db.collection("StudentGrades").where("studentId", "==", currentUser.id).get();
            let myGrades = {}; snap.forEach(doc => myGrades[doc.data().courseCode] = doc.data());
            let fullData = BASE_COURSES.map(c => ({ ...c, grade: myGrades[c.code] ? myGrades[c.code].grade : '-' }));
            for(let code in myGrades) {
                if(!BASE_COURSES.find(bc => bc.code === code)) {
                    fullData.push({ code, name: myGrades[code].courseName, credit: 3, category: 'วิชาเสรี (เลือก 6 หน่วยกิต)', grade: myGrades[code].grade });
                }
            }
            renderCourses(fullData);
        }

        function renderCourses(data) {
            const gradesMap = { 'A': 4, 'B+': 3.5, 'B': 3, 'C+': 2.5, 'C': 2, 'D+': 1.5, 'D': 1, 'F': 0 };
            let totalCr = 0, totalPt = 0, html = '', cats = {};
            data.forEach(c => { if(!cats[c.category]) cats[c.category] = []; cats[c.category].push(c); });
            for(let cat in cats) {
                let limit = cat.includes('เลือก 1 วิชา') ? 1 : (cat.includes('เลือก 6 หน่วยกิต') ? 2 : (cat.includes('เลือก 21 หน่วยกิต') ? 7 : 0));
                let passed = cats[cat].filter(i => i.grade !== '-' && i.grade !== 'F').length;
                let locked = limit > 0 && passed >= limit;
                html += `<div class="mb-10 text-left"><h4 class="font-bold text-slate-700 mb-5 border-l-4 border-indigo-500 pl-3 uppercase text-sm">${cat}</h4><div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;
                cats[cat].forEach(i => {
                    let isP = i.grade !== '-' && i.grade !== 'F';
                    if(isP) { totalCr += i.credit; totalPt += (i.credit * gradesMap[i.grade]); }
                    let dis = locked && !isP ? 'disabled opacity-40 grayscale pointer-events-none' : '';
                    html += `<div class="p-5 rounded-[1.8rem] border shadow-sm flex justify-between items-center transition-all ${isP ? 'bg-indigo-50/50 border-indigo-200' : 'bg-white border-slate-100'} ${dis}">
                        <div class="overflow-hidden mr-4"><p class="font-bold text-slate-800 text-lg">${i.code}</p><p class="text-xs text-slate-500 font-medium truncate">${i.name} (${i.credit} นก.)</p></div>
                        <select onchange="saveGrade('${i.code}', this.value)" ${dis} class="bg-slate-50 border p-2.5 rounded-xl text-sm font-bold">
                            <option value="-">-</option>${['A','B+','B','C+','C','D+','D','F'].map(g => `<option value="${g}" ${i.grade===g?'selected':''}>${g}</option>`).join('')}
                        </select></div>`;
                });
                html += `</div></div>`;
            }
            document.getElementById('courseContainer').innerHTML = html;
            document.getElementById('gpax').innerText = totalCr > 0 ? (totalPt / totalCr).toFixed(2) : '0.00';
            document.getElementById('totalCredits').innerText = totalCr;
        }

        async function saveGrade(code, grade) {
            let info = BASE_COURSES.find(c => c.code === code);
            // Unique ID: StudentID_CourseCode
            await db.collection("StudentGrades").doc(`${currentUser.id}_${code}`).set({
                studentId: currentUser.id, courseCode: code, grade, courseName: info ? info.name : 'วิชาเลือกเสรี'
            });
            updateDashboard();
        }

        // --- 5. Admin Actions ---
        async function loadAdmin() {
            const snap = await db.collection("Users").get();
            let html = '', count = 0;
            snap.forEach(doc => {
                const d = doc.data(); if(d.role === 'admin') return; count++;
                html += `<div class="bg-slate-50 p-5 rounded-2xl flex justify-between items-center border border-slate-200">
                    <div class="text-left"><p class="font-bold text-slate-800">${doc.id}</p><p class="text-xs text-slate-500 font-medium">${d.name} (ปี ${d.year})</p></div>
                    <button onclick="deleteUser('${doc.id}')" class="text-red-500 bg-white p-3 rounded-full hover:bg-red-500 hover:text-white transition shadow-sm border border-red-100"><i class="fa-solid fa-trash-can"></i></button></div>`;
            });
            document.getElementById('userContainer').innerHTML = html; document.getElementById('adminTotalUsers').innerText = count;
        }

        async function addUser() {
            const u = document.getElementById('newUsername').value, p = document.getElementById('newPassword').value;
            const sid = document.getElementById('newStudentId').value, n = document.getElementById('newName').value, y = document.getElementById('newYear').value;
            if(!u || !p || !n) return Swal.fire('เตือน', 'กรุณากรอกข้อมูลให้ครบ', 'warning');
            await db.collection("Users").doc(u).set({ password: p, name: n, year: y, studentId: sid, role: 'student' });
            Swal.fire('สำเร็จ', 'เพิ่มสมาชิกแล้ว', 'success'); loadAdmin();
        }

        async function deleteUser(id) {
            const res = await Swal.fire({ title: 'ยืนยัน?', text: `ต้องการลบข้อมูลรหัส ${id}?`, showCancelButton: true });
            if(res.isConfirmed) { await db.collection("Users").doc(id).delete(); loadAdmin(); }
        }

        // --- 6. Helper Functions ---
        function toggleLoginView(v) {
            document.getElementById('studentLoginBox').style.display = v === 'student' ? 'block' : 'none';
            document.getElementById('adminLoginBox').style.display = v === 'admin' ? 'block' : 'none';
        }
        function logout() { location.reload(); }
        function toggleLanguage() { appLang = appLang === 'th' ? 'en' : 'th'; localStorage.setItem('appLang', appLang); updateDashboard(); }
        function promptAddFreeElective() {
            Swal.fire({
                title: 'เพิ่มวิชาเสรี', html: `<input id="sw-code" class="swal2-input" placeholder="รหัสวิชา"><input id="sw-name" class="swal2-input" placeholder="ชื่อวิชา">`,
                preConfirm: () => ({ code: document.getElementById('sw-code').value.toUpperCase(), name: document.getElementById('sw-name').value })
            }).then(r => r.isConfirmed && saveGrade(r.value.code, '-'));
        }
        function exportToPDF() { window.print(); }
    </script>
